databaseChangeLog:
  - changeSet:
      id: 009-change-cards-owner-fk-to-restrict
      author: andrey
      preConditions:
        onFail: MARK_RAN
        foreignKeyConstraintExists:
          foreignKeyName: fk_cards_owner
          foreignKeyTableName: cards
      changes:
        - dropForeignKeyConstraint:
            baseTableName: cards
            constraintName: fk_cards_owner
        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_owner
            onDelete: RESTRICT
