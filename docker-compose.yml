services:
  postgres:
    image: postgres:16
    container_name: bankcards-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bankcards}
      POSTGRES_USER: ${POSTGRES_USER:-bankcards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bankcards}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bankcards} -d ${POSTGRES_DB:-bankcards}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
